name: Run Python Script

on:
  schedule:
    - cron: "*/10 * * * *"   # 每10分鐘執行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # ✅ 更新版本

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ 更新版本
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install requests pandas

      - name: Run script
        run: |
          python main.py
