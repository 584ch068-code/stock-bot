name: Stock Auto Fetch & Upload

on:
  schedule:
    - cron: "0 9 * * *"   # 每天 09:00 UTC = 17:00 台灣時間
  workflow_dispatch:       # 可以手動觸發

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas gspread oauth2client lxml html5lib

      - name: Check installed packages
        run: |
          pip list
      - name: Run Python script
        run: python main.py
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
