name: Stock Auto Fetch & Upload

on:
  schedule:
    - cron: "30 5 * * *"   # 每天 05:30 UTC = 13:30 台灣時間
  workflow_dispatch:       # 可以手動觸發

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas gspread oauth2client lxml

      - name: Run Python script
        run: python main.py
        env:
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
